<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgroTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>
    <main> 
        <section class="demo-request-form">
            <div class="content">
                <h2 data-i18n="demo.title" >Would you like to see it in action?</h2>
                <p data-i18n="demo.subtitle">We show you how AgroTrack adapts to your plots and crops</p>
            </div>

            <!--Form to request a demo-->
            <div class="form">
                <h3 data-i18n="demo.formTitle">Request a demo</h3>
                <p data-i18n="demo.formSubtitle">We’ll contact you within 24 hours.</p>
                <form>
                    <!-- Full name input with label-->
                    <label for="fullName" data-i18n="demo.labelName">Full Name</label>
                    <input type="text" name="fullName" id="fullName" placeholder="Carlos Alcántara" required aria-label="Full Name">

                    <!-- Email input with label-->
                    <label for="email" data-i18n="demo.labelEmail">Email</label>
                    <input type="email" name="email" id="email" placeholder="Alcantara64@hotmail.com" required aria-label="Email">

                    <!-- Button to request a demo-->
                    <button type="submit" class="request-demo" data-i18n="demo.formButton">Request demo</button>
                </form>
            </div>
        </section>

        <!-- Button to change language-->
        <button class="button-language" type="button" onclick="toggleLanguage()">EN | ES</button>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
